name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    env:
      BINARY_NAME: weixinmp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and zip
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"

          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          OUTDIR="dist/${BINARY_NAME}_${TAG}_${GOOS}_${GOARCH}"
          mkdir -p "${OUTDIR}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath \
              -ldflags "-s -w -X main.version=${TAG} -X main.commit=${GITHUB_SHA}" \
              -o "${OUTDIR}/${BINARY_NAME}${EXT}" \
              .

          export ZIP_PATH="dist/${BINARY_NAME}_${TAG}_${GOOS}_${GOARCH}.zip"
          export BIN_PATH="${OUTDIR}/${BINARY_NAME}${EXT}"
          python3 - <<'PY'
          import os
          import zipfile

          zip_path = os.environ["ZIP_PATH"]
          bin_path = os.environ["BIN_PATH"]

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              zf.write(bin_path, arcname=os.path.basename(bin_path))
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/${{ env.BINARY_NAME }}_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    env:
      BINARY_NAME: weixinmp
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}" \
          DIST_DIR="dist" \
          OUTPUT_PATH="${RUNNER_TEMP}/weixinmp.rb" \
          BINARY_NAME="${BINARY_NAME}" \
          ./scripts/render-homebrew-formula.sh

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Update Homebrew formula
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p Formula

          if [[ -f Formula/weixinmp.rb ]] && cmp -s "${RUNNER_TEMP}/weixinmp.rb" Formula/weixinmp.rb; then
            echo "No Homebrew formula changes to commit."
            exit 0
          fi

          cp "${RUNNER_TEMP}/weixinmp.rb" Formula/weixinmp.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/weixinmp.rb
          git commit -m "chore(homebrew): update formula for ${GITHUB_REF_NAME}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
